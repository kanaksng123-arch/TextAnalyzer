spring:
  application:
    name: textAnalyzer
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: textAnalyzerDb
      auto-index-creation: true

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
